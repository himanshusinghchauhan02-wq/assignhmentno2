<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Weather Analyzing Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #1e3c72;
            --card: rgba(255, 255, 255, 0.15);
            --text: white;
        }

        .light {
            --bg: #f5f5f5;
            --card: #ffffff;
            --text: black;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, var(--bg), #2a5298);
            color: var(--text);
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: var(--card);
            padding: 15px;
            margin: 10px;
            border-radius: 12px;
        }

        button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: orange;
            color: white;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        canvas {
            background: white;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🌦️ Weather Analyzing Dashboard</h1>

        <input type="text" id="city" placeholder="Enter city">
        <button onclick="getWeather()">Search</button>
        <button onclick="getLocationWeather()">📍 Location</button>
        <button onclick="toggleTheme()">🌙 Toggle Mode</button>

        <div id="result"></div>

        <div class="card">
            <h3>📊 Temperature Trend</h3>
            <canvas id="tempChart"></canvas>
        </div>

        <div class="card">
            <h3>🌧️ Rain Probability</h3>
            <canvas id="rainChart"></canvas>
        </div>

        <div class="card">
            <h3>⏱️ Hourly Temperature</h3>
            <canvas id="hourlyChart"></canvas>
        </div>
    </div>

    <script>
        const apiKey = "3014a8b4ac394d28b0584917263003";

        let tempChart, rainChart, hourlyChart;

        // 🌙 Theme toggle
        function toggleTheme() {
            document.body.classList.toggle("light");
        }

        // 📍 GPS
        function getLocationWeather() {
            navigator.geolocation.getCurrentPosition(pos => {
                const query = `${pos.coords.latitude},${pos.coords.longitude}`;
                fetchWeather(query);
            });
        }

        // 🔍 Search
        function getWeather() {
            const city = document.getElementById("city").value || "New Delhi";
            fetchWeather(city);
        }

        // 🌦️ Fetch API
        async function fetchWeather(query) {
            try {
                const res = await fetch(
                    `https://api.weatherapi.com/v1/forecast.json?key=${apiKey}&q=${query}&days=3&aqi=yes`
                );
                const data = await res.json();

                if (data.error) throw new Error(data.error.message);

                const current = data.current;
                const forecast = data.forecast.forecastday;

                document.getElementById("result").innerHTML = `
      <div class="card">
        <h2>${data.location.name}</h2>
        <h3>${current.temp_c} °C</h3>
        <p>${current.condition.text}</p>
        <p>💨 AQI: ${current.air_quality.pm2_5.toFixed(1)}</p>
      </div>
    `;

                // 📊 Temperature Chart
                const labels = forecast.map(d => d.date);
                const temps = forecast.map(d => d.day.avgtemp_c);

                if (tempChart) tempChart.destroy();
                tempChart = new Chart(tempChartCanvas, {
                    type: "line",
                    data: { labels, datasets: [{ label: "Temp °C", data: temps }] }
                });

                // 🌧️ Rain Chart
                const rain = forecast.map(d => d.day.daily_chance_of_rain);

                if (rainChart) rainChart.destroy();
                rainChart = new Chart(rainChartCanvas, {
                    type: "bar",
                    data: { labels, datasets: [{ label: "Rain %", data: rain }] }
                });

                // ⏱️ Hourly Chart
                const hours = forecast[0].hour;
                const hourLabels = hours.map(h => h.time.split(" ")[1]);
                const hourTemps = hours.map(h => h.temp_c);

                if (hourlyChart) hourlyChart.destroy();
                hourlyChart = new Chart(hourlyChartCanvas, {
                    type: "line",
                    data: { labels: hourLabels, datasets: [{ label: "Hourly Temp", data: hourTemps }] }
                });

            } catch (err) {
                document.getElementById("result").innerHTML =
                    `<div class="card">❌ ${err.message}</div>`;
            }
        }

        // Canvas references
        const tempChartCanvas = document.getElementById("tempChart");
        const rainChartCanvas = document.getElementById("rainChart");
        const hourlyChartCanvas = document.getElementById("hourlyChart");
    </script>

</body>

</html>
